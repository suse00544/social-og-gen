<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --text-color: #ffffff;
    --subtitle-color: rgba(255, 255, 255, 0.85);
    --meta-color: rgba(255, 255, 255, 0.7);
    --accent-color: #f093fb;
    --card-bg: rgba(255, 255, 255, 0.08);
    --card-border: rgba(255, 255, 255, 0.15);
    /* Customizable via options */
    --font-size-title: 56px;
    --font-size-subtitle: 24px;
    --font-size-meta: 16px;
  }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans',
      Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .canvas {
    width: 1200px;
    height: 630px;
    background: var(--bg);
    position: relative;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 60px 72px;
  }

  /* Background image overlay */
  .canvas.has-bg-image {
    background-size: cover;
    background-position: center;
  }

  .canvas.has-bg-image::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(2px);
  }

  .canvas > * {
    position: relative;
    z-index: 1;
  }

  /* Decorative elements */
  .canvas::after {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
    opacity: 0.15;
    border-radius: 50%;
    z-index: 0;
  }

  .content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
  }

  .title {
    font-size: var(--font-size-title);
    font-weight: 800;
    color: var(--text-color);
    line-height: 1.15;
    letter-spacing: -0.02em;
    max-width: 900px;
    /* Clamp for very long titles */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .subtitle {
    font-size: var(--font-size-subtitle);
    font-weight: 400;
    color: var(--subtitle-color);
    line-height: 1.5;
    max-width: 750px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--card-border);
  }

  .author-section {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--card-border);
  }

  .author-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .author-name {
    font-size: var(--font-size-meta);
    font-weight: 600;
    color: var(--text-color);
  }

  .domain {
    font-size: 14px;
    color: var(--meta-color);
    font-weight: 400;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-color);
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    padding: 4px 12px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  /* Pattern overlay for texture */
  .pattern-overlay {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="canvas {{bgImageClass}}" style="{{customStyles}}{{bgImageStyle}}">
  <div class="pattern-overlay"></div>
  <div class="content">
    <h1 class="title">{{title}}</h1>
    {{#subtitle}}<p class="subtitle">{{subtitle}}</p>{{/subtitle}}
  </div>
  <div class="footer">
    <div class="author-section">
      {{#logo}}<img class="logo" src="{{logo}}" alt="logo">{{/logo}}
      <div class="author-info">
        {{#author}}<span class="author-name">{{author}}</span>{{/author}}
        {{#domain}}<span class="domain">{{domain}}</span>{{/domain}}
      </div>
    </div>
    {{#tags}}<div class="tags">{{tags}}</div>{{/tags}}
  </div>
</div>
</body>
</html>
